<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mohamad Kira</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }
    #stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .container {
      text-align: center;
      z-index: 1;
      animation: fadeIn 2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .profile-pic {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 3px solid #e63946;
      box-shadow: 0 0 25px rgba(230, 57, 70, 0.6);
      animation: spin 8s linear infinite;
      margin: 0 auto 20px;
      object-fit: cover;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      height: 50px;
    }
    .cursor {
      animation: blink 1s infinite;
      color: #e63946;
      font-weight: 100;
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
    .bio {
      color: #aaa;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }
    .links a {
      background: #1a1a1a;
      color: #fff;
      text-decoration: none;
      padding: 12px 30px;
      border: 1px solid #e63946;
      border-radius: 8px;
      transition: 0.3s;
      box-shadow: 0 0 10px rgba(230, 57, 70, 0.3);
    }
    .links a:hover {
      background: #e63946;
      box-shadow: 0 0 20px rgba(230, 57, 70, 0.8);
      transform: translateY(-3px);
    }
    .counter {
      color: #666;
      font-size: 0.9rem;
    }
    .music-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 50px;
      height: 50px;
      background: #e63946;
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(230, 57, 70, 0.7);
      transition: 0.3s;
      z-index: 100;
    }
    .music-btn:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  
  <audio id="bgMusic" loop>
    <source src="Albumaty.Com_XXXTENTACION_MOONLIGHT.mp3" type="audio/mpeg">
  </audio>
  
  <audio id="clickSound">
    <source src="https://assets.mixkit.co/active_storage/sfx/3005/3005-preview.mp3" type="audio/mpeg">
  </audio>
  
  <button class="music-btn" onclick="toggleMusic()">▶️</button>

  <div class="container">
    <img src="kira.jpg" alt="Mohamad Kira" class="profile-pic">
    <h1><span id="typed-name"></span><span class="cursor">|</span></h1>
    <p class="bio">20 yo</p>
    
    <div class="links">
      <a href="https://instagram.com/ckira1_" target="_blank">انستا</a>
      <a href="https://wa.me/201027814410" target="_blank" onclick="playClick()">واتساب</a>
      <a href="https://github.com/MohammedCkira" target="_blank">جيت هاب</a>
    </div>

    <div class="counter">
      <span id="visitCount">0</span> :عدد الزيارات
    </div>
  </div>

  <script>
    // كتابة الاسم
    const nameText = "Mohamad Kira";
    let i = 0;
    const speed = 150;

    function typeWriter() {
      if (i < nameText.length) {
        document.getElementById("typed-name").innerHTML += nameText.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
      }
    }

    window.addEventListener('load', typeWriter);

    // صوت الكليك
    function playClick() {
      const click = document.getElementById('clickSound');
      click.volume = 0.5;
      click.play();
    }

    // الموسيقى
    const music = document.getElementById('bgMusic');
    const musicBtn = document.querySelector('.music-btn');
    let isPlaying = false;

    function toggleMusic() {
      if (isPlaying) {
        music.pause();
        musicBtn.textContent = '▶️';
      } else {
        music.play();
        musicBtn.textContent = '⏸️';
      }
      isPlaying = !isPlaying;
    }

    // النجوم
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let stars = [];
    for(let i = 0; i < 100; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.5,
        speed: Math.random() * 0.5
      });
    }

    function animateStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#e63946';
      stars.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fill();
        star.y += star.speed;
        if(star.y > canvas.height) {
          star.y = 0;
          star.x = Math.random() * canvas.width;
        }
      });
      requestAnimationFrame(animateStars);
    }
    animateStars();

    // عداد الزيارات
    let count = localStorage.getItem('visitCount') || 0;
    count++;
    localStorage.setItem('visitCount', count);
    document.getElementById('visitCount').textContent = count;

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
